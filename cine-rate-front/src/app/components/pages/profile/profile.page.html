<ion-content>
  <div class="profile-bg"></div>
  <app-top-bar (onSearch)="onSearch($event)"></app-top-bar>

  <div class="content">
    <div class="profile-header">
      <div class="avatar-section">
        <ion-icon name="person-circle-outline" class="avatar-icon"></ion-icon>
        <div class="user-info">
          <h2 class="user-name">{{ user.name }}</h2>
          <span class="user-email">{{ user.email }}</span>
        </div>
      </div>
      <div class="action-buttons">
        <div class="primary-actions">
          <ion-button fill="clear" class="action-btn" (click)="logout()">
            <ion-icon name="log-out-outline"></ion-icon>
            <span>Salir</span>
          </ion-button>
          <ion-button fill="clear" class="action-btn" (click)="editProfile()">
            <ion-icon name="create-outline"></ion-icon>
            <span>Editar</span>
          </ion-button>
        </div>
        <div class="danger-actions">
          <ion-button
            fill="clear"
            class="action-btn delete"
            (click)="confirmDelete()"
          >
            <ion-icon name="trash-outline"></ion-icon>
            <span>Eliminar</span>
          </ion-button>
        </div>
      </div>
    </div>

    <app-profile-stats
      [media]="user.media"
      [vistas]="user.vistas"
    ></app-profile-stats>

    <app-user-admin-list
      *ngIf="isAdmin"
      [users]="adminUsers"
      [loading]="adminLoading"
      (roleChange)="onAdminRoleChange($event)"
    ></app-user-admin-list>
  </div>

  <app-bottom-nav (tabChange)="onTabChange($event)"></app-bottom-nav>
</ion-content>
